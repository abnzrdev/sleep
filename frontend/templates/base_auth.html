<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LunaSleep AI | Auth{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#7aa7ff' },
                    fontFamily: {
                        display: ['CohereText', '"Space Grotesk"', 'Inter', 'ui-sans-serif', 'system-ui'],
                        sans: ['"Unica77 Cohere Web"', 'Inter', 'Arial', 'ui-sans-serif', 'system-ui'],
                        mono: ['CohereMono', '"IBM Plex Mono"', '"SFMono-Regular"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            background: #1a1a1e;
            color: #eeeaf4;
            font-family: "Unica77 Cohere Web", Inter, Arial, ui-sans-serif, system-ui;
        }

        .display-face {
            font-family: CohereText, "Space Grotesk", Inter, ui-sans-serif, system-ui;
            letter-spacing: -0.04em;
        }

        .section-label {
            color: rgba(255, 255, 255, 0.6);
            font-family: CohereMono, "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .auth-gradient {
            background:
                radial-gradient(circle at 20% 12%, rgba(255, 255, 255, 0.16), transparent 24%),
                radial-gradient(circle at 78% 30%, rgba(122, 167, 255, 0.16), transparent 24%),
                linear-gradient(135deg, #332052 0%, #211833 42%, #17171c 100%);
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            color: white;
            outline: none;
            width: 100%;
        }

        .auth-input:focus {
            border-color: rgba(122, 167, 255, 0.55);
            box-shadow: 0 0 0 2px rgba(122, 167, 255, 0.5);
        }

        .particle-line {
            animation: drift 11s ease-in-out infinite alternate;
        }

        .particle-line:nth-child(2) { animation-delay: 1.8s; }
        .particle-line:nth-child(3) { animation-delay: 3.2s; }

        @keyframes drift {
            from { transform: translate3d(-10px, 8px, 0); }
            to { transform: translate3d(16px, -12px, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .particle-line { animation: none; }
        }
    </style>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="min-h-screen bg-[#1a1a1e]">
    {% block content %}{% endblock %}
</body>
</html>
