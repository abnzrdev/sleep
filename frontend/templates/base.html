<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Sleep Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cohere: {
                            black: '#ffffff',
                            near: '#eeeaf4',
                            deep: '#f8f5ff',
                            blue: '#7aa7ff',
                            ring: '#7aa7ff',
                            purple: '#9b60aa',
                            snow: '#242329',
                            light: '#34313a',
                            border: '#ffffff1a',
                            muted: '#b9b3c4',
                            success: '#73d99f',
                            alert: '#ff8f85',
                        },
                    },
                    borderRadius: { signature: '20px' },
                    fontFamily: {
                        display: ['CohereText', '"Space Grotesk"', 'Inter', 'ui-sans-serif', 'system-ui'],
                        sans: ['"Unica77 Cohere Web"', 'Inter', 'Arial', 'ui-sans-serif', 'system-ui'],
                        mono: ['CohereMono', '"IBM Plex Mono"', '"SFMono-Regular"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        :root {
            --base-bg: #1a1a1e;
            --cohere-blue: #7aa7ff;
            --cohere-ring: rgba(122, 167, 255, 0.5);
            --cohere-white: #ffffff;
            --cohere-muted: #b9b3c4;
            --cohere-success: #73d99f;
            --cohere-alert: #ff8f85;
        }

        body {
            font-family: "Unica77 Cohere Web", Inter, Arial, ui-sans-serif, system-ui;
            background: var(--base-bg);
            color: #eeeaf4;
        }

        .display-face {
            font-family: CohereText, "Space Grotesk", Inter, ui-sans-serif, system-ui;
            letter-spacing: -0.04em;
        }

        .section-label {
            color: rgba(255, 255, 255, 0.6);
            font-family: CohereMono, "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .cohere-card,
        .cohere-card-strong {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
        }

        .hero-band {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.14), transparent 28%),
                radial-gradient(circle at 75% 20%, rgba(122, 167, 255, 0.16), transparent 24%),
                linear-gradient(135deg, #332052 0%, #211833 42%, #17171c 100%);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            color: var(--cohere-white);
        }

        .nav-link {
            border-radius: 9999px;
            color: rgba(255, 255, 255, 0.72);
            padding: 0.7rem 1rem;
            transition: color 150ms ease, background-color 150ms ease;
        }

        .nav-link:hover,
        .nav-link-active {
            background: rgba(255, 255, 255, 0.08);
            color: var(--cohere-white);
        }

        .input-shell {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            transition: border-color 150ms ease, box-shadow 150ms ease;
        }

        .input-shell:focus-within {
            border-color: rgba(122, 167, 255, 0.55);
            box-shadow: 0 0 0 2px var(--cohere-ring);
        }

        .metric-value {
            font-family: CohereText, "Space Grotesk", Inter, ui-sans-serif, system-ui;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .status-pill {
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 9999px;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            padding: 0.45rem 0.9rem;
            text-transform: uppercase;
        }

        .status-live {
            background: rgba(115, 217, 159, 0.10);
            border-color: rgba(115, 217, 159, 0.24);
            color: var(--cohere-success);
        }

        .status-alert {
            background: rgba(255, 143, 133, 0.10);
            border-color: rgba(255, 143, 133, 0.24);
            color: var(--cohere-alert);
        }

        .ghost-button,
        .outline-button,
        .solid-button {
            border-radius: 9999px;
            transition: color 150ms ease, opacity 150ms ease, background-color 150ms ease, border-color 150ms ease;
        }

        .ghost-button {
            color: rgba(255, 255, 255, 0.72);
        }

        .ghost-button:hover {
            color: var(--cohere-white);
        }

        .solid-button {
            background: var(--cohere-white);
            color: #17171c;
        }

        .solid-button:hover {
            background: var(--cohere-blue);
            color: #101018;
        }

        .outline-button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: var(--cohere-white);
        }

        .outline-button:hover {
            border-color: rgba(255, 255, 255, 0.42);
        }

        .fade-in {
            animation: fadeIn 420ms ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen bg-[#1a1a1e] text-cohere-near antialiased">
    <div class="min-h-screen">
        <header class="border-b border-white/10 bg-[#1a1a1e]/90 backdrop-blur">
            <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5 lg:px-10">
                <div>
                    <a href="{{ '/' if current_user.is_authenticated else '/landing' }}" class="display-face text-2xl text-white">Sleep Command</a>
                    <p class="mt-1 text-sm text-white/45">Predictive sleep analytics and live sensor operations</p>
                </div>
                <nav class="flex flex-wrap items-center gap-2 rounded-full border border-white/10 bg-white/5 p-1.5">
                    {% if current_user.is_authenticated %}
                    <a href="/" class="nav-link {% if active_page == 'predictor' %}nav-link-active{% endif %}">Predictor</a>
                    <a href="/monitor" class="nav-link {% if active_page == 'monitor' %}nav-link-active{% endif %}">Monitor</a>
                    <a href="/logout" class="nav-link">Logout</a>
                    {% else %}
                    <a href="/login" class="nav-link {% if active_page == 'login' %}nav-link-active{% endif %}">Login</a>
                    <a href="/register" class="solid-button px-4 py-2 text-sm">Sign Up</a>
                    {% endif %}
                </nav>
            </div>
        </header>

        <main class="mx-auto max-w-7xl px-6 py-8 lg:px-10 lg:py-10">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
