{% extends "base.html" %}

{% block title %}{{ t("app.name") }} | {{ page_title }}{% endblock %}

{% block content %}
<section class="hero-band p-8 lg:p-10">
    <div class="section-label">{{ page_title }}</div>
    <h1 class="display-face mt-4 text-5xl leading-none text-white lg:text-6xl">{{ t("coming_soon.title") }}</h1>
    <p class="mt-5 max-w-2xl text-base leading-7 text-white/70">
        {{ t("coming_soon.copy") }}
    </p>
    <a href="/" class="outline-button mt-8 inline-flex px-5 py-3 text-sm font-medium">{{ t("common.back_to_landing") }}</a>
</section>
{% endblock %}
